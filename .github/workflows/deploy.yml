name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npx vite build
        env:
          NODE_ENV: production
          # Si tu as un domaine personnalisé → remplace par VITE_BASE=/
          # Si tu utilises nikohorizonsport.github.io/Template-chiro → garde /Template-chiro/
          VITE_BASE: /Template-chiro/

      - name: SPA routing — copy index.html as 404.html
        run: cp dist/public/index.html dist/public/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      - uses: actions/deploy-pages@v4
        id: deployment
